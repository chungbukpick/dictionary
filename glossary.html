<style>

  .tag.type-client { background: #f5eef8; color: #8e44ad; }

    margin-top: 8px;
    font-size: 0.75rem;

    color: white;

</head>

</div>

<div class="main">

: ""}, {"type": "용어(구)", "abbr": "Associate Member", "eng": "A legally constituted supranational continental organisation, which is a recognised contributor to the promotion and management of University Sport at the continental level.", "kor": "대륙단위의 대학 스포츠 홍보 및 관리 담당으로서, 공식적으로 임명된 초국가 조직", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Attachés", "eng": "An attaché is a person responsible for providing protocol services to client groups, managing their schedules, offering necessary information about the Games, and acting as a liaison between the organizing committee and the groups they work with", "kor": "현장 의전수행원으로 주요 클라이언트 그룹과 일정을 함께하며 일정관리, 대회 안내, 본부와의 연락 등을 수행함", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Back of House", "eng": "The back of the house (BOH) is the behind-the-scenes area of a venue, not open to public, where most of the Games preparation takes place for the games related workforces. (e.g., warm-up, locker room, lounge, broadcasting area, on-site management office, etc.)", "kor": "베뉴에서 관객의 눈에 보이지 않는, 주로 경기 관계자와 관련된 공간(예: 워밍업, 라커룸, 라운지, 방송보도구역, 현장 관리 사무실 등)", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Brand Protection", "eng": "Protect the Intellectual Properties that are related to the Games, such as the Games name, emblem, logo, masco, FISU mark and etc and prevent the association with unauthorized brands as well", "kor": "FISU 마크를 포함한 대회 명칭, 엠블럼, 로고, 마스코트 등 지식 재산에 대한 보호(허가 받지 않은 브랜드와 연관 방지)", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Chaperone", "eng": "A chaperone is a person who assists with the overall process of doping testing, including notifying athletes selected as doping test subjects and accompanying and observing athletes until they arrive at the doping testing laboratory", "kor": "시료채취요원으로 도핑검사 대상자로 선정된 선수에 대한 통지 및 선수가 도핑검사실에 도착할 때까지 선수와 동반하여 관찰하는 업무 등 도핑 검사 전반적인 과정을 돕는 요원", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Concept of White Venue\n(Clean Venue)", "eng": "This concept involves covering or removing unauthorized advertising materials within the competition and non-competition facility during the Games period to maintain a clean and organized environment", "kor": "대회기간 동안 대회 시설내 승인받지 않은 광고 홍보물을 가리거나 제거해서 깨끗한(Clean) 상태로 유지하는 개념", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Counterfeit Merchandise", "eng": "All products that are plagiarized by using the Game's brand design", "kor": "대회 브랜드 디자인 제품을 표절한 모든 상품", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Designated Hospital", "eng": "Hospitals (general hospital level) designated by venue for emergency situations", "kor": "응급 상황을 대비하여 베뉴별로 지정된 병원(종합병원급)", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Exclusive Rights", "eng": "Exclusive rights to the organizing committee's business in exchange for sponsorship", "kor": "후원으로 인해 반대급부로 얻는 조직위 사업에 대해 독점적 권리", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Field of Play", "eng": "The part of a field that is officially marked as the place where the action of a game happens", "kor": "경기가 실제로 이뤄지는 장소로 공식적으로 표시된 경기장의 일부, 경기구역", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "FISU Family", "eng": "Refers to the International University Sports Federation (FISU) Executive Committee (EC) members, honorary and emeritus members as well as committee members, FISU staff and FISU advisors. \nDuring the FISU World University Games (FISU Games), the FISU Family also encompasses the FISU guests.", "kor": "FISU 집행위원, 명예회원 및 위원, 자문위원, 직원을 의미하며 세계대학경기대회 중에는 FISU의 게스트도 포함함", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "FISU Games Participants", "eng": "FISU Games participants refer to all client groups holding a proper FISU World University Games accreditation card during the period as indicated on their accreditation card, \nincluding the delegations, Technical Officials, media representatives, FISU Family and Guests, workforce, etc.", "kor": "대표단, 기술임원, 방송 관계자, FISU 패밀리 및 게스트, 스텝 등을 포함하는 대회 승인 표찰을 소지한 모든 클라이언트를 뜻함", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "FISU Games Venues", "eng": "FISU Games Venues refer to all venues related to the organisation and operation of the FISU World University Games, including but not limited to the follows: \nthe FISU Games Village, the competition venues, the training venues, the of cial hotels, the Main Media Centre, the ceremony venues and the FISU Games Park, etc.", "kor": "세계대학경기대회의 조직 및 운용에 연관된 모든 시설을 뜻하며, FISU 선수촌, 경기장, 임원 호텔, 메인 미디어 센터, 대회 공원, 기념장, 등을 포함", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Fronf of House", "eng": "The front of house (FOH) is the area of a venue where can be seen by the public\n(e.g., spectator's seating, ticket booth, entrance/exit, security, field of play, etc.)", "kor": "베뉴에서 관중에게 공개되는 공간 (예:객석, 매표소, 출입구, 보안, 경기구역 등)", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Games Information System", "eng": "Games web result content management and corresponding information search system (game schedule, game results, medal information, weather forecast, etc.)", "kor": "대회 웹 결과 콘텐츠 관리 및 해당 정보 탐색 시스템(경기 스케줄, 경기 결과, 메달 정보, 일기예보 등)", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Games Management System", "eng": "A system consisting of several applications that facilitate the Games management  (Participant accreditation, accommodation management, arrivals and departures  management, etc.)", "kor": "대회 관리를 용이하게 하는 여러 응용프로그램으로 구성된 시스템(참가자 인증, 숙박관리, 입출국관리 등)", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Games Results System", "eng": "A system that manages Games time and scoring measurement, TV graphics, information system, etc.\n*INFO application, WWW results page, on-site/remote commentator information system, mobile app, etc.", "kor": "경기시간 계측/채점, TV 그래픽스, 정보시스템 등을 관리 \n*INFO 애플리케이션, WWW 결과 페이지, 현장/원격해설자 정보시스템, 모바일 앱 등", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Hospitality Centre (Lounge)", "eng": "As designated area for the client groups, the protocol services will be provided", "kor": "클라이언트 그룹을 위해 지정된 구역으로, 의전 서비스가 제공됨", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Host Broadcaster", "eng": "The host broadcaster, appointed by the organising committee, designs, installs and operates the IBC broadcasting techonolgy facilities and produces and provides the television signal, make video clips, highlights and etc.", "kor": "OC가 지정, 텔레비전 신호를 제작 및 제공하며, 하이라이트 및 뉴스 클립 제작, IBC 방송 기술 시설 설계, 설치·운영하는 방송사", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Intellectual Property", "eng": "Tangible and intangible rights created through the Games and provided as intellectual property rights and marketing rights", "kor": "대회를 통해서 만들어져 지적 재산권으로 마케팅 권리로 제공하는 유무형의 권리", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "International Broadcasting\nCentre", "eng": "A television broadcast center where the host broadcaster receives and distributes signals generated at the host city", "kor": "주관방송사가 개최지에서 생성된 신호를 수신하고 분배하는 텔레비전 방송센터", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Licensing", "eng": "A commercial venture that grants businesses the right to produce and sell specific products using the Games symbols and other related elements in exchange for royalties.", "kor": "대회 상징물 등을 활용해 특정상품을 제조 판매할 수 있는 권리를 로열티를 받고 사업자에게 제공하는 상품화권 사업", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Main Media Centre", "eng": "IBC+MPC=MMC", "kor": "IBC+MPC=MMC", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Main Operations Centre", "eng": "Responsible for coordinating all decision-making and communication that each venue or functional area cannot independently resolve during the FISU Games (e.g. monitoring the overall situation of the Games, daily reports, high level meetings and problem-solving processes)", "kor": "FISU 대회 기간 동안 각 베뉴 또는 기능영역이 독자적으로 해결할 수 없는 모든 의사 결정 및 커뮤니케이션을 조정하는 역할을 담당.(대회 전체 상황 모니터링, 일일보고, 지휘부 회의 및 문제 해결 프로세스 등)", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Main Press Centre", "eng": "A central workspace for all registered media personnel during the Games", "kor": "대회 기간 중에 등록된 모든 미디어진을 위한 중심적인 업무공간", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Master Schedule", "eng": "Master schedule serves as a checklist to ensure that no plan is missed and includes the overview of the FISU games, and all the major schedule from the preparation phase to opening of the Games.", "kor": "대회 준비부터 개최시까지의 모든 주요 일정이 포함되어야하며 FISU 세계대학경기대회 프로젝트의 개요를 제시하고 계획에서 놓치지 않도록 체크리스트 역할을 함.", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Member Association", "eng": "A National University Sports Federation (NUSF) that is a member of FISU.", "kor": "FISU에 속해있는 국립대학스포츠협회", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Mixed Zone", "eng": "A designated area at the venue where the athletes can be interviewed with the media and the broadcasters as they leave the field of play.", "kor": "공동취재구역, 경기 종료 후 인터뷰를 위해 선수, 기자들이 만나는 장소", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Participation Fee", "eng": "A participation fee is the fee that an Organising Committee (OC) is entitled to collect from the participating countries, per day and per person, to cover accommodation, food and beverage, transportation and other associated local services that are relevant for participating in the FISU World University Games , and in accordance to FISU rules.", "kor": "조직위원회가 세계대학경기대회 참가국으로 부터 요구할 권한이 있는 비용으로, 참가 선수 및 관계자의 하루 숙소 이용료, 식비, 교통비 및 기타 경비를 1인 당 책정해서 받을 수 있음", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Polyclinic", "eng": "General Clinic in the FISU Games Village", "kor": "선수촌 내 종합진료소", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Rate Card(RTC)", "eng": "Fee/rate table for additional items (products or services) provided for a fee to the client groups", "kor": "클라이언트 그룹에게 유료로 제공되는 추가적인 사항(제품이나 서비스)들에 대한 요금·율 표", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Sponsor", "eng": "Individuals, companies, and organizations that contribute cash or goods to the organising committee", "kor": "조직위원회에 현금 및 물품을 후원하는 사람이나 기업, 기관 등", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Sport", "eng": "A sport is that which is governed by an International Federation (IF). Within FISU sport refers equally to “sport” and “sport discipline”.", "kor": "FISU 종목은 \"스포츠 종목\" 및 \"스포츠 종목 분야\"를 의미하며 국제연맹의 관리를 받음", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Sport discipline", "eng": "A sport discipline is a branch of a sport comprising one or more events.", "kor": "한 가지 혹은 이상의 세부종목을 포함하는 스포츠 종목의 한 분야", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Sport Entries", "eng": "A list of registered and applied athletes selected according to qualifications and procedures set by each country's sports organization and sports federation", "kor": "각국 스포츠 단체 및 스포츠 연맹이 지정한 자격과 절차에 따라 선발된 선수의 이름을 등록 및 신청한 명부", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Sport event", "eng": "An event is a competition in a sport that gives rise to a ranking.", "kor": "종목(스포츠) 안에서 순위를 매기는 세부 종목 경기", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Sport Information Centre", "eng": "Sport Information Centre provides information regarding trainning venues' allotment, games and general information and deals with the inconvenience, complaints reports from the delegations and resolves them.", "kor": "각 종목의 연습장 배정, 경기 정보, 경기관련 행사, 일반사항에 대한 안내 및 선수단 문의사항, 불편·항의 접수·해결 등", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Sport Presentation", "eng": "In-venue broadcasting to provide sport information, announcement, sports commentary, music, video, and other entertainment for the spectators to make exciting atmosphere and allow them to focus on the games", "kor": "스포츠 경기가 열리는 경기장에서 장내방송, 경기해설, 음악, 영상, 엔터테인먼트 등을 활용하여 관람자들에게 유익한 스포츠 정보와 함께 볼거리, 즐길 거리를 제공함으로써 관람자에게 신나는 분위기를 조성하고 경기에 집중과 몰입을 할 수 있게 해주는 프로그램", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Support Staff", "eng": "Dispatched workforce supported by the public organization and/or institution for the Games operations \n(Local goverments, military, police, fire agency, and other sports related organizaitons)", "kor": "대회운영을 위하여 공공기관에서 지원되는 요원(지자체, 군, 경찰, 소방, 체육단체 등 유관기관)", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Technical Handbook", "eng": "Document describes the overall oepration of the each sports in English (venue, regulations, equipment, workforce, etc) that is published after being verified by FISU Technical Committee Chairs", "kor": "경기 종목별 운영 전반에 대한 내용 (베뉴, 규칙, 장비, 인력 등)을 FISU TCC의 검증을 거쳐 영문으로 발간한 자료", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Technical Officials", "eng": "Technical Officials (TOs) include referees and judges and other sport-specific officials that are required for the smooth running of the sports competitions.\nThere are International Technical Officials (ITOs) and National Technical Officials (NTOs) in accordance with the rules and regulations of each sport", "kor": "심판 및 심사위원, 원활한 경기 진행을 위한 기타 스포츠 임원을 뜻하며, 각 종목의 규정과 규칙에 따라 국제기술임원(ITO)와 국내기술임원(NTO)가 있음", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Test Event", "eng": "Test event is held before the official opening of the actual games to check the all aspects of the games oepration whether the athletes can competite in a safe environment", "kor": "정식 대회에 앞서 경기 운영 등 실전 제반 사항을 점검하여 안전한 환경에서 경기에 참가할 수 있는지에 대한 여부를 확인하기 위해 개최되는 사전 이벤트 대회", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Therapeutic Use Exemption", "eng": "Allowing the use of a prohibited medication or method for therapeutic purposes if an athlete has a medical condition that necessitates its use, provided the athlete meets the criteria outlined in the \"International Standard for Therapeutic Use Exemptions\" and \"Article 4.4 of the World Anti-Doping Code\". \n(The medication or method should only aid in treatment without enhancing performance beyond what is necessary, and no alternative treatment should be available.)", "kor": "선수가 금지약물 또는 금지방법의 사용이 필요한 의학적 상태에 있고, 「치료목적사용면책 국제표준」 및 세계도핑방지규약 제4.4조에 따른 조건을 충족하는 경우에 치료목적으로 금지약물 또는 금지방법의 사용을 허가하는 것\n(치료 외 추가적 경기력 향상을 일으키지 않아야 하고, 대체 치료가 없어야 함)", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Value-In-Kind", "eng": "Goods and services provided as in-kind contributions by sponsors", "kor": "후원사가 현물로 후원하는 물품 및 서비스", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Venue Broadcasting Centre", "eng": "A designated space for international signal production and IBC transmission at the semi-final, final events at the venues as well as the opening and closing ceremonies", "kor": "준결승, 결승경기장, 개폐회장의 국제신호제작 및 IBC로 송출을 위한 현장 방송센터", "desc": "", "importance": "", "fa": "", "team": ""}, {"type": "용어(구)", "abbr": "Venue Media Centre", "eng": "A media center with a reduced concept of the main media center located at all stadiums and opening and closi ": "국가코드", "abbr": "VIN", "eng": "Saint Vincent and the Grenadines", "kor": "Saint Vincent and the Grenadines", "desc": "대륙: America", "importance": "", "fa": "", "team": ""}, {"type": "국가코드", "abbr": "YEM", "eng": "Yemen", "kor": "Yemen", "desc": "대륙: Asia", "importance": "", "fa": "", "team": ""}, {"type": "국가코드", "abbr": "ZAM", "eng": "Zambia", "kor": "Zambia", "desc": "대륙: Africa", "importance": "", "fa": "", "team": ""}, {"type": "국가코드", "abbr": "ZIM", "eng": "Zimbabwe", "kor": "Zimbabwe", "desc": "대륙: Africa", "importance": "", "fa": "", "team": ""}];

const TYPE_CLASS = {
  '약어': 'type-약어',
  '용어(구)': 'type-용어',
  '내부용어': 'type-내부',
  'FA코드': 'type-fa',
  '클라이언트코드': 'type-client',
  '종목코드': 'type-sport',
  '국가코드': 'type-country',
};
const TYPE_LABEL = {
  '약어': '약어',
  '용어(구)': '용어·구',
  '내부용어': '내부용어',
  'FA코드': 'FA코드',
  '클라이언트코드': '클라이언트',
  '종목코드': '종목',
  '국가코드': '국가',
};

let currentFilter = 'all';
let currentQuery = '';
let currentPage = 0;
const PAGE_SIZE = 30;
let filteredData = [];

function escape(str) {
  return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function highlight(text, query) {
  if (!query) return escape(text);
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escape(text).replace(new RegExp(escaped, 'gi'), m => `<mark>${m}</mark>`);
}

function score(item, q) {
  if (!q) return 1;
  const ql = q.toLowerCase();
  const abbrL = item.abbr.toLowerCase();
  if (abbrL === ql) return 100;
  if (abbrL.startsWith(ql)) return 80;
  if (abbrL.includes(ql)) return 60;
  if (item.eng.toLowerCase().includes(ql)) return 40;
  if (item.kor.toLowerCase().includes(ql)) return 30;
  if (item.desc.toLowerCase().includes(ql)) return 10;
  return 0;
}

function filter() {
  const q = currentQuery.trim().toLowerCase();
  filteredData = RAW_DATA.filter(item => {
    if (currentFilter !== 'all' && item.type !== currentFilter) return false;
    if (!q) return true;
    return score(item, q) > 0;
  });
  if (q) {
    filteredData.sort((a, b) => score(b, q) - score(a, q));
  }
  currentPage = 0;
  render();
}

function makeCard(item, q) {
  const typeClass = TYPE_CLASS[item.type] || '';
  const typeLabel = TYPE_LABEL[item.type] || item.type;
  const hasDesc = item.desc && item.desc.trim();
  const hasMeta = (item.fa && item.fa.trim()) || (item.team && item.team.trim());

  // For 용어(구): abbr is the term, eng is english definition
  let abbrHtml = highlight(item.abbr, q);
  let engHtml = '';
  if (item.type === '용어(구)') {
    engHtml = item.kor ? `<div class="kor-name">${highlight(item.kor, q)}</div>` : '';
  } else {
    if (item.eng && item.eng !== item.abbr) {
      engHtml = `<div class="eng-name">${highlight(item.eng, q)}</div>`;
    }
    if (item.kor && item.kor !== item.eng && item.kor !== item.abbr) {
      engHtml += `<div class="kor-name">${highlight(item.kor, q)}</div>`;
    }
  }

  const descHtml = hasDesc ? `<div class="desc">${highlight(item.desc, q)}</div>` : '';
  const metaHtml = hasMeta ? `<div class="meta">
    ${item.team ? `<span><b>팀:</b> ${escape(item.team)}</span>` : ''}
    ${item.fa ? `<span><b>FA:</b> ${escape(item.fa)}</span>` : ''}
  </div>` : '';
  const importanceHtml = item.importance ? `<span class="importance">${escape(item.importance)}</span>` : '';

  return `<div class="card" data-type="${escape(item.type)}">
    <div class="card-top">
      <div class="abbr">${abbrHtml}</div>
      <div class="abbr-right">
        ${engHtml}
      </div>
    </div>
    <div class="tags">
      <span class="tag ${typeClass}">${typeLabel}</span>
      ${importanceHtml}
    </div>
    ${descHtml}
    ${metaHtml}
  </div>`;
}

function render() {
  const total = filteredData.length;
  const slice = filteredData.slice(0, (currentPage + 1) * PAGE_SIZE);
  
  document.getElementById('stats').textContent = `검색 결과: ${total.toLocaleString()}개`;
  
  if (total === 0) {
    document.getElementById('results').innerHTML = `<div class="empty"><div class="icon">🔍</div>검색 결과가 없습니다.</div>`;
    document.getElementById('loadMore').style.display = 'none';
    return;
  }

  const q = currentQuery.trim().toLowerCase();
  document.getElementById('results').innerHTML = slice.map(item => makeCard(item, q)).join('');
  document.getElementById('loadMore').style.display = slice.length < total ? 'block' : 'none';
}

document.getElementById('searchInput').addEventListener('input', e => {
  currentQuery = e.target.value;
  filter();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    filter();
  });
});

document.getElementById('loadMore').addEventListener('click', () => {
  currentPage++;
  const q = currentQuery.trim().toLowerCase();
  const slice = filteredData.slice(0, (currentPage + 1) * PAGE_SIZE);
  const newCards = filteredData.slice(currentPage * PAGE_SIZE, (currentPage + 1) * PAGE_SIZE);
  document.getElementById('results').innerHTML += newCards.map(item => makeCard(item, q)).join('');
  document.getElementById('loadMore').style.display = slice.length < filteredData.length ? 'block' : 'none';
});

// Initial render
filter();
</script>
